name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          VITE_API_URL=http://85.31.224.202:3002/api npm run build

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /root/apnet/andreiabiscuit
            git pull origin main
            npm install --prefix /root/apnet/andreiabiscuit/backend
            npm run build --prefix /root/apnet/andreiabiscuit/backend
            node /root/apnet/andreiabiscuit/backend/dist/db/migrate.js
            pm2 restart andreiabiscuit --update-env || pm2 start /root/apnet/andreiabiscuit/backend/dist/index.js --name andreiabiscuit --cwd /root/apnet/andreiabiscuit/backend
            pm2 serve /root/apnet/andreiabiscuit/frontend 3124 --name frontend_andreia --spa || pm2 restart frontend_andreia
            pm2 save

      - name: Upload frontend build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend/dist/*"
          target: "/root/apnet/andreiabiscuit/frontend"
          strip_components: 2
